name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci-frontend:
    name: CI Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm --filter frontend typecheck
      - name: Lint
        run: pnpm --filter frontend lint
      - name: Tests
        run: pnpm --filter frontend test:run
      - name: Build
        run: pnpm --filter frontend build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'http://localhost:3001' }}

  ci-backend:
    name: CI Backend
    runs-on: ubuntu-latest
    steps:
      - name: Stub
        run: echo "Backend CI will be configured when backend is added"

  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan npm dependencies
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: ./apps/frontend
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - name: Build Docker image for scanning
        run: docker build -t frontend:${{ github.sha }} ./apps/frontend
      - name: Scan Docker image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: frontend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
